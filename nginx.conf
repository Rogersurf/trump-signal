events {}

http {
    server {
        listen 7860;

        # ─────────────────────────────
        # API ROUTES → FastAPI (8000)
        # ─────────────────────────────
        location /posts {
            proxy_pass http://127.0.0.1:8000/posts;
        }

        location /categories {
            proxy_pass http://127.0.0.1:8000/categories;
        }

        location /stocks {
            proxy_pass http://127.0.0.1:8000/stocks;
        }

        location /data {
            proxy_pass http://127.0.0.1:8000/data;
        }

        location /gdelt {
            proxy_pass http://127.0.0.1:8000/gdelt;
        }

        location /qa {
            proxy_pass http://127.0.0.1:8000/qa;
        }

        location /model {
            proxy_pass http://127.0.0.1:8000/model;
        }

        location /pipeline {
            proxy_pass http://127.0.0.1:8000/pipeline;
        }

        location /health {
            proxy_pass http://127.0.0.1:8000/health;
        }

        # ─────────────────────────────
        # FRONTEND → Streamlit (8501)
        # ─────────────────────────────
        location / {
            proxy_pass http://127.0.0.1:8501;
        }
    }
}