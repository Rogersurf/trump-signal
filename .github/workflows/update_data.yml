name: Weekly Data Update

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas datasets huggingface_hub apscheduler

      - name: Initialize database (if missing)
        run: python backend_database/init_db.py

      - name: Run daily update (one-off)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend_database/daily_update.py --once
      
      - name: Debug - Locate database file
        run: |
          echo "Searching for trump_data.db..."
          find . -name "trump_data.db" -type f 2>/dev/null || echo "File not found"
          echo "Current directory:"
          pwd
          ls -la

      - name: Upload database to Hugging Face Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Determine correct path from debug output, then use it
          python -c "
          import os
          from huggingface_hub import HfApi
          # Check both possible locations
          if os.path.exists('trump_data.db'):
              file_path = 'trump_data.db'
          elif os.path.exists('backend_database/trump_data.db'):
              file_path = 'backend_database/trump_data.db'
          else:
              raise FileNotFoundError('trump_data.db not found in root or backend_database/')
          api = HfApi()
          api.upload_file(
              path_or_fileobj=file_path,
              path_in_repo='trump_data.db',
              repo_id='Rogersurf/trump_pulse_data',
              repo_type='dataset'
          )
          print('✅ Database uploaded from', file_path)
          "